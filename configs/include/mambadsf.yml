task: detection

model: RTDETR
criterion: RTDETRCriterionv2
postprocessor: RTDETRPostProcessor


use_focal_loss: True
eval_spatial_size: [640, 640]


RTDETR: 
  backbone: MambaFPNBackbone
  encoder: DFMambaEncoder
  decoder: RTDETRTransformerv2
  

MambaFPNBackbone:
  variant: mamba_vision_T
  out_channels: [256, 256, 256]
  return_idx: [1, 2, 3]
  fpn_dim: 256
  pretrained: False
  freeze_at: 0
  freeze_norm: True
  custom_depths: [2, 4, 6, 2]


DFMambaEncoder:
  in_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_heads: 8
  dilation: [1, 2, 3, 4]
  d_state: 16
  expand: 1.5
  dropout: 0.
  kernel_size: 3
  mlp_ratio: 4.0


RTDETRTransformerv2:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3
  num_layers: 6
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  eval_idx: -1
  num_points: [4, 4, 4]
  cross_attn_method: default
  query_select_method: default


RTDETRPostProcessor:
  num_top_queries: 300


RTDETRCriterionv2:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_sawiou: 2, loss_csc: 0.5}
  losses: ['vfl', 'boxes', ]
  alpha: 0.75
  gamma: 2.0
  
  # SA-WIoU: Size-Adaptive Wasserstein-IoU Loss
  use_sawiou: True
  sawiou_tau_area: 0.01
  sawiou_tau_w: 0.177
  
  # CSC: Cross-Scale Semantic Consistency Loss
  use_csc: True
  csc_feat_strides: [8, 16, 32]

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
