__include__: [
  '../dataset/uatd_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/mambadsf.yml',
]


output_dir: ./output/mambadsf_uatd


optimizer:
  type: AdamW
  params: 
    - 
      params: '^(?=.*backbone\.mamba_model)(?!.*norm).*$'
      lr: 0.0005
    - 
      params: '^(?=.*backbone\.lateral|.*backbone\.fpn|.*backbone\.pan)(?!.*norm).*$'
      lr: 0.0002
    - 
      params: '^(?=.*(?:encoder|decoder|backbone))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
    -
      params: '^(?=.*dec_score_head|.*enc_score_head|.*denoising_class).*$'
      lr: 0.0005

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001


epoches: 100
clip_max_norm: 0.1


lr_scheduler:
  type: MultiStepLR
  milestones: [40, 60, 85]
  gamma: 0.5


# Warmup
lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 500


train_dataloader:
  total_batch_size: 8
  num_workers: 8

val_dataloader:
  total_batch_size: 8
  num_workers: 8

